version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: urukais_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: urukais
      POSTGRES_PASSWORD: urukais_secret
      POSTGRES_DB: urukais_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urukais -d urukais_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urukais_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: urukais_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: urukais
      RABBITMQ_DEFAULT_PASS: urukais_secret

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
