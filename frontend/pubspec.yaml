name: urukais_klick
version: 0.1.0+1
publish_to: 'none'
description: Aplicación oficial de Urukais Klick

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.5.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  injectable: ^2.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.0
  google_fonts: ^6.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
